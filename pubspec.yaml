name: run_for_win
description: Run For Win — Creador de personajes de bloques Brix + Endless Runner
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Internationalization (Global Material/Widgets/Cupertino localizations)
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Game engine
  flame: ^1.18.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.2.7

  # Audio
  audioplayers: ^6.0.0

  # Utilities
  uuid: ^4.4.2
  get_it: ^8.0.2

  # Compras integradas (IAP). Solo iOS/Android; en web no hay implementación
  # (nunca se instancia el adaptador real en web → la build web no se afecta).
  in_app_purchase: ^3.2.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/audio/music/
