<!DOCTYPE html>
<html>
<head>
  <!--
    The base href placeholder is replaced by flutter build web
    with the value of --base-href (e.g. "/lego-custom-character/").
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Run For Win — Crea tu personaje de bloques Brix y corre sin parar">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Run For Win">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FFD700">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="manifest" href="manifest.json">
  <title>Run For Win</title>

  <style>
    body {
      background-color: #1a1a2e;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    /* Full-screen canvas on mobile */
    #flutter_target {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
  <!--
    flutter_bootstrap.js is generated by `flutter build web` (Flutter 3.22+).
    It bootstraps the Dart application in the browser.
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
