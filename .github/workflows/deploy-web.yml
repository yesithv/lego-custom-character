name: Deploy BrixRun to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/flutter-hello-world-6u87go
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # peaceiris needs write to push to gh-pages branch

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Build (corre en main Y en la rama feature) ─────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Versión de Flutter
        run: flutter --version

      - name: Instalar dependencias
        run: flutter pub get

      - name: Crear directorios de assets vacíos
        run: |
          mkdir -p assets/sprites/character/head
          mkdir -p assets/sprites/character/torso
          mkdir -p assets/sprites/character/legs
          mkdir -p assets/sprites/character/accessories
          mkdir -p assets/sprites/worlds
          mkdir -p assets/audio

      - name: Build web
        run: |
          flutter build web \
            --release \
            --base-href "/lego-custom-character/"

      - name: Subir build como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 1

  # ── 2. Deploy (solo cuando se hace push a main) ───────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Descargar build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Desplegar en GitHub Pages (rama gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          publish_branch: gh-pages
          force_orphan: true
